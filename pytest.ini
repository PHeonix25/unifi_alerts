[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning:josepy
    ignore::DeprecationWarning:acme
    ignore::DeprecationWarning:homeassistant.components.http
markers =
    integration: end-to-end tests that use a real HomeAssistant instance (hass fixture)
